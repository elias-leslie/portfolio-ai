name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: portfolio_app
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: portfolio_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portfolio_app -d portfolio_ai_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PORTFOLIO_DB_URL: postgresql://portfolio_app:secret@localhost:5432/portfolio_ai_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --extra dev
      - name: Ruff
        working-directory: backend
        run: uv run ruff check app tests
      - name: ty
        working-directory: backend
        run: uv run ty check app
      - name: Pytest
        working-directory: backend
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Biome lint
        working-directory: frontend
        run: pnpm lint
      - name: TypeScript
        working-directory: frontend
        run: pnpm exec tsc --noEmit
      - name: Vitest
        working-directory: frontend
        run: pnpm test -- --run
      - name: Build
        working-directory: frontend
        run: pnpm build
