# Financial Modeling Prep (FMP) API Source Configuration
# Comprehensive financial data including statements, ratios, and historical prices

source_id: fmp
display_name: Financial Modeling Prep
type: rest_api
priority: 3
enabled: true

target_tables:
  - minute_bars
  - day_bars
  - reference_cache
  - news_cache

connection:
  base_url: https://financialmodelingprep.com/stable
  method: GET
  timeout: 15
  headers: {}
  params:
    apikey: "{{secret:fmp:apikey}}"
  sample_path: /quote?symbol=AAPL&apikey={{secret:fmp:apikey}}

auth:
  type: query
  query_param: apikey
  value: "{{secret:fmp:apikey}}"

# Field mappings: API response field → database column
field_mapping:
  day_bars:
    date: $.historical[*].date
    open: $.historical[*].open
    high: $.historical[*].high
    low: $.historical[*].low
    close: $.historical[*].close
    volume: $.historical[*].volume
    vwap: $.historical[*].vwap

  minute_bars:
    ts_utc: $[*].date
    open: $[*].open
    high: $[*].high
    low: $[*].low
    close: $[*].close
    volume: $[*].volume

  reference_cache:
    ticker_name: $[*].name
    market_cap: $[*].marketCap
    exchange: $[*].exchange
    sector: $[*].sector
    industry: $[*].industry
    website: $[*].website
    description: $[*].description
    ipo_date: $[*].ipoDate

  news_cache:
    headline: $[*].title
    url: $[*].url
    published_at: $[*].publishedDate
    news_source_name: $[*].site
    description: $[*].text
    image_url: $[*].image

transforms:
  ts_utc: timestamp_iso
  date: date_iso
  published_at: timestamp_iso

capabilities:
  minute: false  # NOT available on free tier (requires subscription)
  day: true  # EOD only
  reference: true
  news: false  # NOT available on free tier (requires subscription)
  fundamentals: true
  financial_statements: true
  ratios: true

rate_limit: "250 calls/day (free Basic tier - estimate)"
rate_limit_config:
  requests_per_minute: null
  requests_per_day: 250

consumers:
  - /api/market-context
  - /api/screen

notes: "TERTIARY OHLCV / PRIMARY METADATA source (score: 86.96/100). Free tier: 250 calls/day, ~100 specific symbols only (AAPL, MSFT, GOOGL, etc). EOD data with VWAP, comprehensive company profiles (10/10 fields). NO intraday or news on free tier. Profiled Oct 2025."
category: multi_source

validation:
  required_env_vars:
    - FMP_API_KEY
  test_ticker: AAPL
  expected_fields:
    - symbol
    - price
