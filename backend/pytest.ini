[pytest]
# Pytest configuration for portfolio-ai backend tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    --strict-markers
    --verbose
    --tb=short
    --color=yes

# Asyncio settings
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function

# Database connection pool settings configured in conftest.py
# Tests use DB_POOL_SIZE=1, DB_MAX_OVERFLOW=1 (2 connections per test)
# to avoid exhausting PostgreSQL's max_connections limit
