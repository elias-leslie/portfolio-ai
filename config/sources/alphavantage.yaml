# Alpha Vantage REST API Source Configuration
# Reliable OHLCV fallback with excellent fundamentals data

source_id: alphavantage
display_name: Alpha Vantage
type: rest_api
priority: 30
enabled: true

target_tables:
  - minute_bars
  - day_bars
  - reference_cache

connection:
  base_url: https://www.alphavantage.co/query
  method: GET
  timeout: 15
  headers: {}
  params:
    apikey: "{{secret:alphavantage:apikey}}"
  sample_path: "?function=TIME_SERIES_INTRADAY&symbol=AAPL&interval=1min"

auth:
  type: query
  query_param: apikey
  value: "{{secret:alphavantage:apikey}}"

field_mapping:
  minute_bars:
    ts_utc: $["Time Series (1min)"][*].timestamp
    open: $["Time Series (1min)"][*]["1. open"]
    high: $["Time Series (1min)"][*]["2. high"]
    low: $["Time Series (1min)"][*]["3. low"]
    close: $["Time Series (1min)"][*]["4. close"]
    volume: $["Time Series (1min)"][*]["5. volume"]

  day_bars:
    date: $["Time Series (Daily)"][*].timestamp
    open: $["Time Series (Daily)"][*]["1. open"]
    high: $["Time Series (Daily)"][*]["2. high"]
    low: $["Time Series (Daily)"][*]["3. low"]
    close: $["Time Series (Daily)"][*]["4. close"]
    volume: $["Time Series (Daily)"][*]["5. volume"]

  reference_cache:
    ticker_name: $.Name
    market_cap: $.MarketCapitalization
    sector: $.Sector
    industry: $.Industry
    exchange: $.Exchange
    description: $.Description
    country: $.Country
    employees: $.FullTimeEmployees

transforms:
  ts_utc: parse_iso8601
  date: parse_iso8601_date
  market_cap: parse_number
  volume: parse_number

capabilities:
  minute: true
  day: true
  reference: true

rate_limit: "5 req/min, 500 req/day (free tier)"
rate_limit_config:
  requests_per_minute: 5
  requests_per_day: 500

consumers:
  - /api/market-context
  - /api/screen

notes: "Reliable OHLCV fallback, excellent fundamentals data"
category: price_volume

validation:
  required_env_vars:
    - ALPHAVANTAGE_API_KEY
  test_ticker: AAPL
  expected_fields:
    - "Meta Data"
    - "Time Series (1min)"
