name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: portfolio
          POSTGRES_PASSWORD: portfolio
          POSTGRES_DB: portfolio
        options: >-
          --health-cmd "pg_isready -U portfolio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev]"

      - name: Lint
        working-directory: backend
        run: |
          source .venv/bin/activate
          ruff check .
          ruff format --check .

      - name: Type check
        working-directory: backend
        run: |
          source .venv/bin/activate
          ty check app/

      - name: Test
        working-directory: backend
        env:
          PORTFOLIO_DB_URL: postgresql://portfolio:portfolio@localhost:5432/portfolio
        run: |
          source .venv/bin/activate
          pytest -x -q -m "not slow and not e2e and not manual"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Type check
        working-directory: frontend
        run: pnpm tsc --noEmit

      - name: Test
        working-directory: frontend
        run: pnpm test
