# Portfolio AI - Process Whitelist Configuration
# ================================================
#
# This file defines processes that should NOT be killed by fresh-start.sh
#
# Format: One pattern per line (grep -E extended regex)
# Comments: Lines starting with # are ignored
# Matching: Each line is matched against "ps aux" output (full command line)
#
# When to update:
# - After system changes (new services installed)
# - When encountering legitimate processes during fresh-start.sh
# - After reviewing baseline snapshot (scripts/baseline/processes.txt)
#
# ================================================
# SYSTEM ESSENTIALS
# ================================================
# These are core Linux processes required for system operation

# Init system
^/sbin/init

# Kernel threads (always safe - PID filtering handles these)
^\[.*\]$

# Systemd and core services
/lib/systemd/systemd
systemd-journald
systemd-logind
systemd-networkd
systemd-resolved
systemd-timesyncd
systemd-udevd

# DBus (inter-process communication)
dbus-daemon
dbus-broker

# Network and device management
NetworkManager
wpa_supplicant
avahi-daemon
ModemManager
accounts-daemon

# Display and graphics
Xorg
Xwayland
/usr/bin/X
gnome-shell
gdm
gdm3
lightdm

# System monitoring
rsyslogd
cron
atd
acpid

# ================================================
# USER SESSION
# ================================================
# User login session and shell processes

# Login shells (parent processes)
^-bash
^-zsh
^bash.*--login

# SSH sessions
sshd:
/usr/sbin/sshd

# Terminal emulators
gnome-terminal
konsole
xterm
kitty
alacritty

# ================================================
# DEVELOPMENT TOOLS
# ================================================
# IDEs, editors, and development utilities

# Editors
vim
nvim
nano
emacs
code
cursor

# Git
git

# Claude Code / AI assistants
claude
/usr/bin/claude
node.*claude

# ================================================
# DATABASE & CACHE SERVICES
# ================================================
# Background data services (managed externally or as system services)

# PostgreSQL (system service)
postgres.*main
/usr/lib/postgresql

# Redis (if system service - NOT portfolio-ai's redis)
redis-server.*systemd

# ================================================
# SCHEDULED PROCESSES
# ================================================
# Legitimate background tasks identified in baseline

# Systemd timers (user)
restic-smart-backup
launchpadlib-cache-clean

# Systemd timers (system)
anacron
systemd-tmpfiles-clean
fwupd-refresh
apt-daily
man-db
plocate-updatedb
motd-news
dpkg-db-backup
logrotate
apt-daily-upgrade
veeam-smart-backup
e2scrub_all
fstrim

# ================================================
# BROWSER & USER APPLICATIONS
# ================================================
# Desktop applications that should remain running

# Web browsers
firefox
chrome
chromium
brave

# Communication
slack
discord
zoom
teams

# ================================================
# DO NOT WHITELIST - PORTFOLIO AI SERVICES
# ================================================
# These patterns identify portfolio-ai processes to KILL
# (Listed here for documentation - fresh-start.sh will kill these)
#
# NEVER add these to the whitelist above!
#
# uvicorn.*app\.main:app
# celery.*worker
# celery.*beat
# node.*next.*dev
# python.*uvicorn.*portfolio-ai
# redis-server.*portfolio-ai
#
# These will be restarted cleanly by scripts/start.sh
# ================================================
