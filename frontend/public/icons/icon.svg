<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="chart-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="port-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#port-bg)"/>
  <!-- Chart area fill -->
  <path d="M80 400 L80 320 L160 280 L240 300 L320 200 L400 120 L432 120 L432 400 Z" fill="url(#chart-grad)" opacity="0.3"/>
  <!-- Chart line -->
  <path d="M80 320 L160 280 L240 300 L320 200 L400 120" fill="none" stroke="url(#chart-grad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data points -->
  <circle cx="80" cy="320" r="16" fill="#0ea5e9"/>
  <circle cx="160" cy="280" r="16" fill="#0ea5e9"/>
  <circle cx="240" cy="300" r="16" fill="#6366f1"/>
  <circle cx="320" cy="200" r="16" fill="#6366f1"/>
  <circle cx="400" cy="120" r="20" fill="#22c55e"/>
  <!-- Upward arrow at end -->
  <path d="M400 120 L380 150 L390 150 L390 180 L410 180 L410 150 L420 150 Z" fill="#22c55e"/>
</svg>
