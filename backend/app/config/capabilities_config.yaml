# System Capabilities Registry Configuration
# Created: 2025-11-13
# Part of: System Capabilities Registry (Task 0059)
# Purpose: Configure auto-discovery, AI analysis, and categorization

scan_config:
  # Global settings
  enabled: true
  scan_schedule: "daily at 03:00 UTC"  # After data refresh tasks

  # What to scan
  targets:
    database:
      enabled: true
      track_field_completeness: true
      track_freshness: true
      null_threshold_pct: 80  # Column is "mostly null" if >80% NULL

      # Expected freshness per table (how often data should update)
      expected_freshness:
        fear_greed_daily: "daily"
        fear_greed_inputs: "daily"
        fear_greed_components: "daily"
        news_cache: "hourly"
        news_summary_log: "hourly"
        news_quality_predictions: "hourly"
        watchlist_snapshots: "60s"
        watchlist_items: "on-demand"
        portfolio_positions: "on-demand"
        market_data: "daily"
        day_bars: "daily"
        technical_indicators: "daily"
        reference_cache: "weekly"
        options_market_metrics: "daily"
        source_metrics: "daily"
        ml_model_metrics: "weekly"
        ml_training_progress: "on-demand"

    celery:
      enabled: true
      track_success_rate: true
      track_duration: true
      lookback_days: 7
      min_success_rate_pct: 95  # Warn if below
      max_duration_warn_ms: 30000  # 30 seconds

    api:
      enabled: true
      track_response_times: false  # Phase 1: Not implemented yet (no middleware)
      track_error_rates: false     # Phase 1: Not implemented yet
      lookback_days: 7
      max_p95_warn_ms: 1000
      max_error_rate_warn_pct: 5.0

  # AI Analysis settings (Phase 2)
  # Uses Claude Code CLI (zero API cost) - no ANTHROPIC_API_KEY needed
  # CLI auto-detected from PATH or CLAUDE_CLI_PATH environment variable
  ai_analysis:
    enabled: true  # Set to false to skip Phase 2
    model: "claude-sonnet-4-5"  # Maps to CLI model flag (sonnet/opus)
    confidence_threshold: 0.70  # Only store insights with confidence >= 0.70
    include_logs: true
    log_lookback_hours: 24
    include_task_files: true
    task_files_path: "tasks/"

# Categorization rules (how to categorize tables/tasks by name pattern)
categorization:
  market_data:
    patterns:
      - "market_data"
      - "ticker"
      - "ohlcv"
      - "day_bars"
      - "price_cache"
      - "options_market"

  news:
    patterns:
      - "news"
      - "article"
      - "sentiment"

  portfolio:
    patterns:
      - "portfolio"
      - "holding"
      - "watchlist"
      - "position"

  analytics:
    patterns:
      - "fear_greed"
      - "technical_indicator"
      - "ml_"
      - "agent_"
      - "source_metrics"
      - "quality"

  infrastructure:
    patterns:
      - "user"
      - "auth"
      - "schema_migration"
      - "celery_"
      - "maintenance"
      - "table_registry"

  strategy:
    patterns:
      - "strategy"
      - "backtest"
      - "trade_signal"

# Freshness calculation rules
# Used to determine freshness_status based on expected_freshness and days_since_update
freshness_rules:
  real-time:  # Expected to update within seconds
    current: 0.02       # < 30 minutes
    acceptable: 0.08    # 30 min - 2 hours
    stale: 0.5          # 2 hours - 12 hours
    critical: 0.5       # > 12 hours

  hourly:  # Expected to update every hour
    current: 0.08       # < 2 hours
    acceptable: 0.25    # 2-6 hours
    stale: 1            # 6-24 hours
    critical: 1         # > 24 hours

  daily:  # Expected to update every day
    current: 1          # < 1 day
    acceptable: 2       # 1-2 days
    stale: 7            # 2-7 days
    critical: 7         # > 7 days

  weekly:  # Expected to update weekly
    current: 7          # < 7 days
    acceptable: 14      # 7-14 days
    stale: 30           # 14-30 days
    critical: 30        # > 30 days

  on-demand:  # Only updates when user action occurs
    current: 999        # Never stale (no time expectations)
    acceptable: 999
    stale: 999
    critical: 999
