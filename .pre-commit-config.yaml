# Pre-commit hooks for portfolio-ai
# See https://pre-commit.com for more information
#
# IMPORTANT: Hook versions synchronized with backend/requirements.txt
# Version sync validated by: ./scripts/validate-versions.sh
# Current versions: ruff 0.14.2, mypy 1.18.2, Python 3.13

repos:
  # Ruff - Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.2
    hooks:
      # Ruff formatter - auto-fix formatting issues
      - id: ruff-format
        name: ruff format
        language_version: python3.13
        types_or: [python, pyi]
        files: ^backend/

      # Ruff linter - catch linting errors
      - id: ruff
        name: ruff check
        language_version: python3.13
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
        files: ^backend/

  # Mypy - Static type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        name: mypy type check
        language_version: python3.13
        types: [python]
        files: ^backend/app/
        args: [--strict]
        additional_dependencies:
          - pydantic>=2.7.0
          - types-requests>=2.31.0
          - types-PyYAML>=6.0.12
          - types-redis>=4.6.0
          - types-psutil>=7.0.0
          - sqlalchemy>=2.0.44
          - psycopg2-binary>=2.9.11
          - polars>=1.6.0
          - httpx>=0.24.0
          - structlog>=24.1.0
          - python-json-logger>=2.0.7
          - yfinance>=0.2.0
          - tenacity>=8.2.0
          - anthropic>=0.25.0
          - fastapi>=0.111.0
          - celery>=5.3.0
          - pandas>=2.2.0
          - pandas-stubs>=2.0.0
          - feedparser>=6.0.0
          - vaderSentiment>=3.3.0

  # General file checks (no version conflicts here)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        name: trim trailing whitespace
      - id: end-of-file-fixer
        name: fix end of files
      - id: check-yaml
        name: check yaml syntax
      - id: check-added-large-files
        name: check for large files
        args: [--maxkb=1000]
      - id: check-merge-conflict
        name: check for merge conflicts
