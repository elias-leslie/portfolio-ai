# PostgreSQL Statement Logging Configuration
#
# CRITICAL: Enables forensic audit trail for data modifications
# Created: 2025-11-09 (Data Loss Incident Response)
#
# Installation Instructions:
# 1. Copy this file to PostgreSQL config directory:
#    sudo cp backend/config/postgresql-logging.conf /etc/postgresql/16/main/conf.d/
# 2. Reload PostgreSQL:
#    sudo systemctl reload postgresql
# 3. Verify logging is enabled:
#    psql -c "SHOW log_statement;"  # Should return 'mod'
#

# Log all data modification statements (INSERT, UPDATE, DELETE, TRUNCATE)
log_statement = 'mod'

# Log queries taking longer than 1 second (helps identify performance issues)
log_min_duration_statement = 1000

# Log line prefix: timestamp [PID] user@database
# Example: 2025-11-09 20:00:00 EST [12345] portfolio_ai_user@portfolio_ai
log_line_prefix = '%t [%p] %u@%d '

# Enable logging collector for proper log file management
logging_collector = on

# Log directory (must exist and be writable by postgres user)
log_directory = '/var/log/postgresql'

# Log filename pattern (rotates daily)
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'

# Rotate logs daily
log_rotation_age = 1d

# Rotate when log reaches 100MB
log_rotation_size = 100MB

# Don't truncate logs on rotation (preserve all data)
log_truncate_on_rotation = off

# Additional useful settings for debugging
log_connections = on          # Log new connections
log_disconnections = on       # Log disconnections
log_duration = off            # Don't log duration of every statement (too verbose)
log_lock_waits = on          # Log when queries wait for locks (helps debug deadlocks)
log_temp_files = 10240       # Log temp files >10MB (helps identify inefficient queries)

# Performance impact: LOW (only logs modifications, not SELECTs)
# Disk usage: ~10-50MB/day depending on activity (configure logrotate for cleanup)
