# =============================================================================
# DECISION MATRIX: Which API for What Data?
# =============================================================================

data_routing:
  ohlcv_daily:
    primary: yfinance
    fallback_1: twelvedata
    fallback_2: finnhub
    fallback_3: polygon
    fallback_4: fmp
    fallback_5: alphavantage
    notes: "yfinance is free and reliable; use others only on failure"

  company_profile:
    primary: yfinance
    fallback_1: finnhub
    fallback_2: polygon
    notes: "yfinance.info has most comprehensive fundamentals"

  fundamentals:
    primary: yfinance
    fallback_1: alphavantage  # Only if 25/day quota allows
    fallback_2: fmp
    notes: "yfinance.info covers 90% of needs"

  analyst_recommendations:
    primary: finnhub  # FREE endpoint confirmed
    fallback_1: yfinance
    notes: "Finnhub /stock/recommendation is FREE"

  news:
    primary: yfinance
    fallback_1: finnhub
    fallback_2: polygon
    fallback_3: fmp
    notes: "Multi-source for diversity"

  economic_indicators:
    primary: fred
    fallback: null  # FRED is the only source
    notes: "VIX, Treasury yields, HY spreads - FRED only"

  vwap:
    primary: polygon  # Only source with VWAP
    fallback: fmp     # Also has VWAP
    notes: "yfinance doesn't provide VWAP"

# =============================================================================
# API KEY CONFIGURATION
# =============================================================================

credentials:
  storage: "PostgreSQL source_credentials table"
  table: "source_credentials"
  columns:
    source_id: "Provider name (e.g., 'finnhub')"
    field: "Key field name (e.g., 'apikey')"
    value: "API key value"

  query_example: |
    SELECT value FROM source_credentials
    WHERE source_id = 'finnhub' AND field = 'apikey';

  env_fallback: |
    Keys can also be set via environment variables:
    - FINNHUB_API_KEY
    - POLYGON_API_KEY
    - FRED_API_KEY
    - FMP_API_KEY
    - TWELVEDATA_API_KEY
    - ALPHAVANTAGE_API_KEY

# =============================================================================
# SOURCE ADAPTER FILES
# =============================================================================

implementation:
  base_class: "backend/app/sources/base.py"
  adapters:
    yfinance: "backend/app/sources/yfinance_source.py"
    finnhub: "backend/app/sources/finnhub_source.py"
    polygon: "backend/app/sources/polygon_source.py"
    fmp: "backend/app/sources/fmp_source.py"
    twelvedata: "backend/app/sources/twelvedata_source.py"
    alphavantage: "backend/app/sources/alphavantage_source.py"
    fred: "backend/app/sources/fred.py"
    sec_edgar: "backend/app/sources/sec_edgar_source.py"
    cboe_most_active: "backend/app/sources/cboe_most_active.py"
    rss_feeds: "backend/app/sources/rss_source.py"
    serpapi: "backend/app/sources/serpapi_source.py"

  multi_source: "backend/app/sources/multi_source_fetcher.py"
  rate_limiting: "backend/app/sources/base_http_client.py"

  # ---------------------------------------------------------------------------
  # SERPAPI (100 searches/month FREE - Google Finance + Google Trends)
  # ---------------------------------------------------------------------------
  serpapi:
    name: "SerpAPI"
    tier: FREE
    api_key_required: true
    env_var: "SERPAPI_API_KEY"
    db_key: "serpapi.apikey"
    priority: 15
    rate_limits:
      per_month: 100  # Free tier
      per_day: null
      notes: "100 searches/month free. $50/month for 5000 searches."

    capabilities:
      ohlcv: false
      fundamentals: false
      news: false
      trends: true
      quotes: true

    endpoints:
      google_finance:
        path: "/search"
        method: GET
        description: "Google Finance quote data for a stock"
        params:
          engine: "google_finance"
          q: "Stock symbol (e.g., AAPL:NASDAQ)"
        fields_returned:
          - summary (price, change, change_percent, currency)
          - graph (historical prices)
          - financials (market_cap, pe_ratio, dividend_yield, etc.)
          - news (related news articles)
        example: "?engine=google_finance&q=AAPL:NASDAQ"
        notes: "Returns comprehensive quote data from Google Finance"

      google_trends:
        path: "/search"
        method: GET
        description: "Google Trends interest over time for a search term"
        params:
          engine: "google_trends"
          q: "Search term (e.g., AAPL stock, Tesla)"
          data_type: "TIMESERIES"
          date: "today 3-m (last 3 months)"
        fields_returned:
          - interest_over_time (date, value)
          - compared_breakdown_by_region
          - related_topics
          - related_queries
        example: "?engine=google_trends&q=AAPL stock&data_type=TIMESERIES"
        notes: "Search volume as sentiment proxy. Higher interest = more attention"

    use_cases:
      - "Google Finance: Additional quote data and financials"
      - "Google Trends: Search volume as sentiment proxy"
      - "Trend analysis for stocks and market topics"
      - "Correlate search interest with price movements"
