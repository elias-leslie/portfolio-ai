# Pre-commit hooks for portfolio-ai
# See https://pre-commit.com for more information
#
# IMPORTANT: These hooks use LOCAL venv tools (not remote pinned versions)
# This ensures pre-commit and direct venv usage always use identical tool versions
# REQUIREMENT: Virtual environment MUST be activated before committing

repos:
  # Local hooks - use tools from activated venv
  - repo: local
    hooks:
      # Venv activation check - MUST run first
      - id: venv-check
        name: check venv activated
        entry: bash -c 'if [ -z "$VIRTUAL_ENV" ]; then echo "ERROR - Virtual environment not activated - Run source backend/.venv/bin/activate"; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true

      # Ruff formatter - auto-fix formatting issues
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types_or: [python, pyi]
        pass_filenames: true
        files: ^backend/

      # Ruff linter - catch linting errors
      - id: ruff-check
        name: ruff check
        entry: ruff check --fix --exit-non-zero-on-fix
        language: system
        types_or: [python, pyi]
        pass_filenames: true
        files: ^backend/

      # Mypy type checking - only app/ directory
      - id: mypy
        name: mypy type check
        entry: mypy
        language: system
        types: [python]
        files: ^backend/app/
        args: [--strict]
        pass_filenames: true

  # General file checks (no version conflicts here)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        name: trim trailing whitespace
      - id: end-of-file-fixer
        name: fix end of files
      - id: check-yaml
        name: check yaml syntax
      - id: check-added-large-files
        name: check for large files
        args: [--maxkb=500]
      - id: check-merge-conflict
        name: check for merge conflicts
