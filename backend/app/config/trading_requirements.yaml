# ========================================================================
# Maturity Levels
# ========================================================================
maturity_levels:
  level_0:
    name: "Missing"
    description: "No data, can't perform analysis"
    coverage: "0%"
    example: "No earnings surprise data → Cannot trade post-earnings drift"

  level_1:
    name: "Minimal"
    description: "Basic data, limited insights"
    coverage: "1-40%"
    example: "Only next earnings date → Can prepare for event, but can't predict direction"

  level_2:
    name: "Adequate"
    description: "Good coverage, reasonable insights"
    coverage: "41-80%"
    example: "Earnings surprise for 60% of tickers → Can trade strategy on covered names"

  level_3:
    name: "Complete"
    description: "Comprehensive data, strong edge potential"
    coverage: "81-100%"
    example: "Earnings surprise + revisions + quality scores for all tickers → Full strategy deployment"

