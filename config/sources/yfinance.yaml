# Yahoo Finance (yfinance library) Source Configuration
# Python library fallback for OHLCV data - no API key required

source_id: yfinance
display_name: Yahoo Finance
type: derived
priority: 1
enabled: true

target_tables:
  - minute_bars
  - day_bars

# Connection config for validation testing (Yahoo Finance v8 API)
# The actual ingestion uses yfinance Python library
connection:
  base_url: https://query1.finance.yahoo.com/v8/finance
  method: GET
  timeout: 10
  headers: {}
  params: {}
  sample_path: /chart/AAPL?interval=1d&range=5d

auth:
  type: none  # No authentication required

# Field mappings are handled by Python adapter
# yfinance library returns pandas DataFrame with standard column names
field_mapping:
  minute_bars:
    ts_utc: index  # DataFrame index contains timestamps
    open: Open
    high: High
    low: Low
    close: Close
    volume: Volume

  day_bars:
    date: index
    open: Open
    high: High
    low: Low
    close: Close
    volume: Volume

capabilities:
  minute: true
  day: true

rate_limit: "Unlimited (uses yfinance library)"
rate_limit_config:
  requests_per_minute: 60  # Conservative estimate to avoid rate limiting

consumers:
  - /api/market-context
  - /api/screen

notes: "PRIMARY OHLCV source (score: 87.9/100). Python yfinance library with 10+ years historical depth. Free tier: Unlimited requests but requires 0.5s delays to avoid IP blocks. Profiled Oct 2025."
category: price_volume

validation:
  required_env_vars: []
  test_ticker: AAPL
  expected_fields:
    - Open
    - High
    - Low
    - Close
    - Volume
