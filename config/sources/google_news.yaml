# Google News RSS Feed Source Configuration
# Free news articles with VADER sentiment analysis - no API key required

source_id: google_news
display_name: Google News
type: rss
priority: 28
enabled: true

target_tables:
  - news_cache

connection:
  base_url: https://news.google.com/rss
  method: GET
  timeout: 10
  headers: {}
  params:
    q: "{ticker}"
    hl: en-US
    gl: US
    ceid: US:en
  sample_path: /search?q=AAPL&hl=en-US&gl=US&ceid=US:en
  feed_url_template: "https://news.google.com/rss/search?q={ticker}&hl=en-US&gl=US&ceid=US:en"

# RSS feeds don't need authentication
auth:
  type: none

# Field mappings: RSS feed fields → DuckDB columns
# RSS feeds use element names, not JSONPath
field_mapping:
  news_cache:
    headline: title           # <title> element
    url: link                 # <link> element
    published_at: published   # <published> or <pubDate> element
    news_source_name: source.name  # <source> element
    description: summary      # <summary> or <description> element

transforms:
  published_at: parse_rfc822_date

capabilities:
  news: true
  sentiment: true

rate_limit: "Polite delay (2 sec between requests), no hard limit"
rate_limit_config:
  delay_between_requests: 2.0
  requests_per_minute: 30

consumers: []

notes: "Google News RSS - Unlimited free news with VADER sentiment analysis. No API key required."
category: news

validation:
  required_env_vars: []
  test_ticker: AAPL
  expected_fields:
    - title
    - link
    - published
