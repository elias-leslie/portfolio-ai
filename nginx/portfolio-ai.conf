# Portfolio AI - nginx reverse proxy configuration
# Handles: SSL termination, API routing, WebSocket for HMR

upstream frontend {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream backend {
    server 127.0.0.1:8000;
    keepalive 64;
}

server {
    listen 192.168.8.233:80;
    listen 127.0.0.1:80;
    server_name 192.168.8.233 localhost;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 192.168.8.233:443 ssl http2;
    listen 127.0.0.1:443 ssl http2;
    server_name 192.168.8.233 localhost;

    # SSL certificates (generated by mkcert)
    ssl_certificate /etc/nginx/ssl/localhost.pem;
    ssl_certificate_key /etc/nginx/ssl/localhost-key.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Logging
    access_log /var/log/nginx/portfolio-ai-access.log;
    error_log /var/log/nginx/portfolio-ai-error.log;

    # ===========================================
    # Custom error pages (dark mode with auto-recovery)
    # ===========================================
    error_page 502 503 504 /error-pages/502.html;

    location /error-pages/ {
        alias /var/www/portfolio-ai/error-pages/;
        internal;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # ===========================================
    # API endpoints that NEED trailing slash (internal rewrite)
    # ===========================================
    location = /api/portfolio { rewrite ^ /api/portfolio/ last; }
    location = /api/strategies { rewrite ^ /api/strategies/ last; }
    location = /api/strategy-seeds { rewrite ^ /api/strategy-seeds/ last; }
    location = /api/capabilities { rewrite ^ /api/capabilities/ last; }
    location = /api/capabilities/features { rewrite ^ /api/capabilities/features/ last; }
    location = /api/vision-goals { rewrite ^ /api/vision-goals/ last; }
    location = /api/vision { rewrite ^ /api/vision/ last; }
    location = /api/recommendations { rewrite ^ /api/recommendations/ last; }
    location = /api/preferences { rewrite ^ /api/preferences/ last; }
    location = /api/ideas { rewrite ^ /api/ideas/ last; }

    # ===========================================
    # API routes → Backend (FastAPI on port 8000)
    # ===========================================
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Health endpoints → Backend
    location /health {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }

    # ===========================================
    # WebSocket for Next.js HMR (Hot Module Reload)
    # Next.js 16 with Turbopack uses /turbopack-hmr
    # ===========================================
    location /turbopack-hmr {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket specific timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Legacy webpack-hmr path (fallback, may still be requested by some clients)
    location /_next/webpack-hmr {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket specific timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ===========================================
    # Static files and pages → Frontend (Next.js on port 3000)
    # ===========================================
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Next.js specific
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===========================================
    # Next.js static assets
    # ===========================================
    location /_next/static {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 60m;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }
}
