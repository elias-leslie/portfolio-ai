[pytest]
# Pytest configuration for portfolio-ai backend tests

# Python path to ensure imports work correctly
pythonpath = .

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Timeout (seconds) - prevents hanging tests
timeout = 60

# Output options
addopts =
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --color=yes
    --cov=app
    --cov-fail-under=50
    -p no:cacheprovider

markers =
    unit: Unit tests (fast, isolated)
    slow: marks tests as slow (deselect with '--runslow')
    smoke: marks tests as critical smoke tests for fast validation (<30s)
    integration: integration tests requiring database and external services (deselect with '-m "not integration"')
    e2e: marks end-to-end tests

# Asyncio settings
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function

# Ignore warnings from third-party packages
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Database connection pool settings configured in conftest.py
# Tests use DB_POOL_SIZE=1, DB_MAX_OVERFLOW=1 (2 connections per test)
# to avoid exhausting PostgreSQL's max_connections limit
