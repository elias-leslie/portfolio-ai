name: Build & Push Docker Images
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag override'
        required: false

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/ci.yml

  image-smoke:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Build backend smoke image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/backend.Dockerfile
          load: true
          tags: portfolio-api:smoke
          cache-from: type=gha,scope=backend-smoke
          cache-to: type=gha,mode=max,scope=backend-smoke
      - name: Build frontend smoke image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/frontend.Dockerfile
          load: true
          tags: portfolio-web:smoke
          build-args: API_URL=http://portfolio-api:8000
          cache-from: type=gha,scope=frontend-smoke
          cache-to: type=gha,mode=max,scope=frontend-smoke
      - name: Exercise fresh images
        run: scripts/docker-image-smoke.sh portfolio-api:smoke portfolio-web:smoke

  build:
    needs: image-smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - component: backend
            dockerfile: docker/backend.Dockerfile
            image-suffix: api
          - component: frontend
            dockerfile: docker/frontend.Dockerfile
            image-suffix: web
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/elias-leslie/portfolio-${{ matrix.image-suffix }}:latest
            ghcr.io/elias-leslie/portfolio-${{ matrix.image-suffix }}:${{ inputs.tag || github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
