# Portfolio AI Redis Configuration (User Service)
# Simplified config for user-mode Redis

# Network
bind 127.0.0.1
port 6379
protected-mode yes

# Data persistence
dir ./data/redis
dbfilename dump.rdb
appendonly yes
appendfilename "appendonly.aof"

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile ""

# Performance
tcp-keepalive 300
timeout 0

# Disable dangerous commands in user mode
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command DEBUG ""
